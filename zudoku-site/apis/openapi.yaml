openapi: 3.0.0
info:
  title: Blog Platform API
  version: 1.0.0
  description: API for managing articles and comments

paths:
  /articles:
    get:
      summary: Get all articles
      responses:
        '200':
          description: OK

    post:
      summary: Create article
      responses:
        '201':
          description: Created

  /articles/{id}:
    get:
      summary: Get article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK

    delete:
      summary: Delete article
      responses:
        '204':
          description: Deleted

  /articles/{id}/comments:
    get:
      summary: Get comments for article
      responses:
        '200':
          description: OK

    post:
      summary: Add comment
      responses:
        '201':
          description: Created

  /comments/{id}:
    delete:
      summary: Delete comment
      responses:
        '204':
          description: Deleted